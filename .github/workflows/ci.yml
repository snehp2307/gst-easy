# ─────────────────────────────────────────
# GSTFlow — GitHub Actions CI/CD
# Build, test, and deploy on push to main
# ─────────────────────────────────────────

name: GSTFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Lint & Type Check ───────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gst-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: gst-app

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: gst-app

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

  # ── Build & Test ────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gst-app/package-lock.json

      - name: Build frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build
        working-directory: gst-app
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'http://localhost:8000/api/v1' }}

  # ── Docker Build & Push ─────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./gst-app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}

  # ── Deploy ──────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy (Backend)
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" || echo "No Render hook configured"

      - name: Trigger Vercel Deploy (Frontend)
        run: |
          curl -s "${{ secrets.VERCEL_DEPLOY_HOOK }}" || echo "No Vercel hook configured"
